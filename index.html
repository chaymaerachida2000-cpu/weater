<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - </title>
    <meta name="keywords" content="maps, localisation, valencia, meteo, tiempo" /> 
    <link rel="stylesheet" href="style.css"> 
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    
    
    <link rel="shortcut icon" href="./IMG/icon.jpg" type="image/x-icon" />
</head>
<body class="weather-body">

    <div class="banair-container">
        <nav class="desktop-nav">
            <ul class="flex-container">
                <li class="flex-item">
                    <i class="fa-solid fa-location-dot"></i> 
                </li>
                <li class="flex-item">16 Avril / SUNDAY</li>
                <li class="flex-item">23:01</li>
            </ul>
        </nav> 
    </div> 

    <main class="weather-main">
        <div class="weather-header">
            <h1>Valencia</h1>
            <p class="actual-temp">15°C - actual</p>
         <div class="main-icon">
    <i class="fa-solid fa-sun"></i>
</div>
        </div>
    </main>
</div>
<div class="hamburger">
                        <span><button type="button" class="btn-open-menu">Inscription (Hover me)</button></span>
         
                        <div class="hamburger-content" id="form-box">
                            <input type="text" id="user-name" placeholder="YOUR NAME">
                            <input type="text" id="city-name" placeholder="city NAME">
                            
                            <button id="submit-btn">resuelted</button>
                        </div>
                    </div>
                     
       <div class="weather-container">
    <ul class="forecast-list">
        <li class="forecast-item">
            <h3>SATURDAY</h3>
            <div class="forecast-icon">
                <i class="fa-solid fa-cloud-bolt"></i>
            </div>
            <div class="temp-box">
                <p>min 3°C</p>
                <p>max 6°C</p>
            </div>
        </li>

        <li class="forecast-item">
            <h3>MONDAY</h3>
            <div class="forecast-icon">
                <i class="fa-solid fa-cloud-showers-heavy"></i>
            </div>
            <div class="temp-box">
                <p>min 0°C</p>
                <p>max 2°C</p>
            </div>
        </li>

        <li class="forecast-item">
            <h3>TUESDAY</h3>
            <div class="forecast-icon">
                <i class="fa-solid fa-bolt-lightning"></i>
            </div>
            <div class="temp-box">
                <p>min -2°C</p>
                <p>max 2°C</p>
            </div>
        </li>
    </ul>
</div>
<div class="divider"></div>

<div class="WEATER-container">
     <ul class="forecast-list">
        <li class="forecast-item">
            <h3>wednesday</h3>
            <div class="forecast-icon">
                <i class="fa-solid fa-wind" style="color: palegreen;"></i>
            </div>
            <div class="temp-box">
                <p>min 5°C</p>
                <p>max 9°C</p>
            </div>
        </li>

        <li class="forecast-item">
            <h3>theursday</h3>
            <div class="forecast-icon">
                <i class="fa-solid fa-snowflake" style="color: palegreen;"></i>
            </div>
            <div class="temp-box">
                <p>min 2°C</p>
                <p>max 6°C</p>
            </div>
        </li>

        <li class="forecast-item">
            <h3>friday</h3>
            <div class="forecast-icon">
                <i class="fa-solid fa-cloud-sun" style="color: palegreen;"></i>
            </div>
            <div class="temp-box">
                <p>min -4°C</p>
                <p>max 2°C</p>
            </div>
        </li>
    </ul>
</div>

</div>
 <script src="java.sc"></script>       
</body>
</html>
